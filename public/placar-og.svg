<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Escuro -->
  <rect width="1200" height="630" fill="#050505"/>
  
  <!-- Efeitos de Luz (Glow) -->
  <circle cx="150" cy="315" r="400" fill="#1D4ED8" opacity="0.3" filter="blur(80px)" />
  <circle cx="1050" cy="315" r="400" fill="#B91C1C" opacity="0.3" filter="blur(80px)" />
  <circle cx="600" cy="500" r="300" fill="#CA8A04" opacity="0.15" filter="blur(80px)" />

  <!-- Logo iTatame -->
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" font-style="italic" text-anchor="middle" letter-spacing="4">
    <tspan fill="#DC2626">i</tspan>TATAME
  </text>

  <!-- Textos Principais -->
  <rect x="440" y="140" width="320" height="50" rx="10" fill="#CA8A04" fill-opacity="0.15" stroke="#CA8A04" stroke-width="2"/>
  <text x="600" y="175" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#FACC15" text-anchor="middle" letter-spacing="2">100% GRATUITO</text>
  
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="85" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">PLACAR DIGITAL IBJJF</text>
  
  <!-- AQUI ESTÁ A FRASE ESTRATÉGICA -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#A1A1AA" text-anchor="middle">Do treino diário à gestão completa do seu campeonato.</text>

  <!-- Mockup do Placar -->
  <rect x="250" y="440" width="220" height="130" rx="20" fill="#1E3A8A" />
  <text x="360" y="535" font-family="Arial, sans-serif" font-size="90" font-weight="900" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="360" y="465" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#93C5FD" text-anchor="middle" text-transform="uppercase">Atleta Azul</text>

  <rect x="730" y="440" width="220" height="130" rx="20" fill="#7F1D1D" />
  <text x="840" y="535" font-family="Arial, sans-serif" font-size="90" font-weight="900" fill="#FFFFFF" text-anchor="middle">0</text>
  <text x="840" y="465" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#FCA5A5" text-anchor="middle" text-transform="uppercase">Atleta Vermelho</text>

  <rect x="470" y="410" width="260" height="130" rx="25" fill="#18181B" stroke="#FACC15" stroke-width="2" />
  <text x="600" y="505" font-family="monospace" font-size="75" font-weight="900" fill="#FACC15" text-anchor="middle">05:00</text>
</svg>
